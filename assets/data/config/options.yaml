menus:
- title: Controls
  options:
  - name: NOTES
    type: section
  - name: Left
    type: control
    saveID: note_left
  - name: Down
    type: control
    saveID: note_down
  - name: Up
    type: control
    saveID: note_up
  - name: Right
    type: control
    saveID: note_right

  - name: ''
    type: section

  # UI Keybinds
  - name: UI
    type: section
  # Directions
  - name: Left
    type: control
    saveID: ui_left
  - name: Down
    type: control
    saveID: ui_down
  - name: Up
    type: control
    saveID: ui_up
  - name: Right
    type: control
    saveID: ui_right
  # Others
  - name: Confirm
    type: control
    saveID: accept
  - name: Back
    type: control
    saveID: back
  - name: Pause
    type: control
    saveID: pause
  - name: Reset
    type: control
    saveID: reset

  - name: ''
    type: section

  # UI Keybinds
  - name: DEVELOPER
    type: section
  # ---------------
  - name: Fullscreen
    type: control
    saveID: fullscreen
  - name: Reload State
    type: control
    saveID: resetState
  - name: Main Menu
    type: control
    saveID: shortcutState
  - name: Debug Display
    type: control
    saveID: debugDisplay
  - name: Reload Assets
    type: control
    saveID: reloadGame

- title: Gameplay
  options:
  - name: Ghost Tapping
    description: If disabled, trying to press a note that doesn't exist will cause a miss.
    saveID: ghostTapping
    type: bool
  - name: Downscroll
    description: If enabled, the notes will scroll from top to bottom instead of bottom to top.
    saveID: downscroll
    type: bool
  - name: Opponent Play
    description: If enabled, you will be able to play as the opponent.
    saveID: playAsOpponent
    type: bool
  - name: Personal Scroll Speed
    description: Set it to 0 to use the default scroll speed.
    saveID: personalScrollSpeed
    type: number
    min: 0
    step: 0.1

- title: Appearance
  options:
  - name: Colored Health Bar
    description: If disabled, the health bar will have basic colors like in V-Slice.
    saveID: coloredHealthBar
    type: bool
  - name: Disable Score Text Lerp
    description: If checked, score text won't lerp and will hard cut to the current score.
    saveID: disableScoreLerping
    type: bool

- title: Miscellaneous
  options:
  - name: Developer Mode
    description: Enables developer features like debug display, editors, etc.
    saveID: developerMode
    type: bool
  - name: Mouse Controls
    description: Allows you to navigate menus via your mouse.
    saveID: mouseControls
    type: bool
  - name: Force Scroll Navigation
    description: FORCES scroll wheel to function in menus if mouse controls is disabled.
    saveID: forceMouseScrolling
    type: bool
  - name: Debug Display on Start
    description: Shows the debug display when you start the game.
    saveID: debugDisplayOnStart
    type: bool
  - name: GPU Caching
    description: < Insert Description >
    saveID: gpuCaching
    type: bool
