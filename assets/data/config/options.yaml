menus:
- title: Controls
  options:
  - name: NOTES
    type: section
  - name: Left
    type: control
    saveID: note_left
  - name: Down
    type: control
    saveID: note_down
  - name: Up
    type: control
    saveID: note_up
  - name: Right
    type: control
    saveID: note_right

  - name: ''
    type: section

  # UI Keybinds
  - name: UI
    type: section
  # Directions
  - name: Left
    type: control
    saveID: ui_left
  - name: Down
    type: control
    saveID: ui_down
  - name: Up
    type: control
    saveID: ui_up
  - name: Right
    type: control
    saveID: ui_right
  # Others
  - name: Confirm
    type: control
    saveID: accept
  - name: Back
    type: control
    saveID: back
  - name: Pause
    type: control
    saveID: pause

  - name: Fullscreen
    type: control
    saveID: fullscreen

  - name: ''
    type: section

  # UI Keybinds
  - name: DEVELOPER
    type: section
    conditions:
      - id: developerMode
        state: true
  # ---------------
  - name: Reload State
    type: control
    saveID: resetState
    conditions:
      - id: developerMode
        state: true
  - name: Main Menu
    type: control
    saveID: shortcutState
    conditions:
      - id: developerMode
        state: true
  - name: Debug Display
    type: control
    saveID: debugDisplay
    conditions:
      - id: developerMode
        state: true
  - name: Reload Assets
    type: control
    saveID: reloadGame
    conditions:
      - id: developerMode
        state: true
  - name: Reset
    description: Sets your health to 0.
    type: control
    saveID: reset
    conditions:
      - id: developerMode
        state: true

- title: Gameplay
  options:
  - name: Ghost Tapping
    description: If disabled, trying to press a note that doesn't exist will cause a miss.
    saveID: ghostTapping
    type: bool
  - name: Downscroll
    description: If enabled, the notes will scroll from top to bottom instead of bottom to top.
    saveID: downscroll
    type: bool
  - name: Opponent Play
    description: If enabled, you will be able to play as the opponent.
    saveID: playAsOpponent
    type: bool
    disabledInPlayState: true
  - name: Personal Scroll Speed
    description: Set it to 0 to use the default scroll speed.
    saveID: personalScrollSpeed
    type: number
    min: 0
    step: 0.1
  - name: Force Middle Scroll
    description: If enabled, middle scroll will be forced for songs that use default strumline positioning.
    saveID: forceMiddleScroll
    type: bool

- title: Appearance
  options:
  - name: Colored Health Bar
    description: If disabled, the health bar will have basic colors like in V-Slice.
    saveID: coloredHealthBar
    type: bool
  - name: Disable Score Text Lerp
    description: If checked, score text won't lerp and will hard cut to the current score.
    saveID: disableScoreLerping
    type: bool
  - name: Kade Engine Popups
    description: If checked, popups like sick, bad, etc. will use Kade Engine's graphics.
    saveID: kadePopups
    type: bool
  - name: Disable Hold Jitter
    description: If checked, hold note jitter will be disabled for all characters.
    saveID: disableHoldJitter
    type: bool

  # Lane Underlay
  - name: Enable Lane Underlay
    description: If checked, a black box will appear under the notes.
    saveID: laneUnderlay
    type: bool
  - name: Underlay Expansion
    description: How much should the lane's width expand from the default.
    saveID: laneGrow
    type: number
    min: 0
    step: 1
    conditions:
      - id: laneUnderlay
        state: true
      - id: fancyLaneUnderlay
        state: false

  - name: Underlay Opacity
    description: How visible should the lane(s) be. (0% - 100%)
    saveID: underlayOpacity
    type: number
    min: 0
    max: 100
    step: 1
    conditions:
      - id: laneUnderlay
        state: true

  - name: Fancy Lane Underlay
    description: If checked, lane underlays will be "fancy".
    saveID: fancyLaneUnderlay
    conditions:
      - id: laneUnderlay
        state: true
    type: bool
  - name: Lane Flash Intensity
    description: 0% - 100%.
    saveID: laneFlashIntensity
    type: number
    min: 0
    max: 100
    step: 1
    conditions:
      - id: laneUnderlay
        state: true
      - id: fancyLaneUnderlay
        state: true

- title: Graphics
  options:
  - name: VSync
    description: If enabled, the game will use the display's refresh rate instead of the Framerate value.
    saveID: vsync
    type: bool
    platform: windows
  - name: Framerate
    description: Sets the target framerate for the game.
    saveID: fps
    type: number
    min: 30
    max: 240
    step: 1
    conditions:
      - id: vsync
        state: false
  - name: Texture Antialiasing
    description: Enables linear filtering on textures for smoother visuals.
    saveID: antialiasTextures
    type: bool
  - name: GPU Caching
    description: Allows the GPU to store textures and keeps them cached, reducing RAM usage. (Mid-High End GPU recommended for this)
    saveID: gpuCaching
    type: bool

- title: Miscellaneous
  options:
  - name: Developer Mode
    description: Enables developer features like debug display, editors, etc.
    saveID: developerMode
    type: bool
  - name: Mouse Controls
    description: Allows you to navigate menus via your mouse.
    saveID: mouseControls
    platform: desktop
    type: bool
  - name: Force Scroll Navigation
    description: FORCES scroll wheel to function in menus if mouse controls is disabled.
    saveID: forceMouseScrolling
    platform: desktop
    type: bool
  - name: Debug Display on Start
    description: Shows the debug display when you start the game.
    saveID: debugDisplayOnStart
    type: bool
    conditions:
      - id: developerMode
        state: true